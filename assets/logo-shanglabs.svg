<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shanglabs Logo - Abstract Lab Flask with Data -->
  <defs>
    <linearGradient id="shanglabs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="60" cy="60" r="60" fill="url(#shanglabs-grad)"/>

  <!-- Flask Body -->
  <path d="M45 25 L45 50 L30 85 C28 90 32 95 38 95 L82 95 C88 95 92 90 90 85 L75 50 L75 25"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Flask Neck -->
  <rect x="45" y="20" width="30" height="10" rx="2" fill="white"/>

  <!-- Data Bubbles -->
  <circle cx="50" cy="70" r="6" fill="rgba(255,255,255,0.8)">
    <animate attributeName="cy" from="70" to="65" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="75" r="4" fill="rgba(255,255,255,0.6)">
    <animate attributeName="cy" from="75" to="68" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="82" r="5" fill="rgba(255,255,255,0.7)">
    <animate attributeName="cy" from="82" to="74" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>
